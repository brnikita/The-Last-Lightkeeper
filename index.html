<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Последний Смотритель</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%23e8b96f'/></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e14; }
    #app { width: 100%; height: 100%; }
    #app canvas { display: block; }
    #loading {
      position: fixed; inset: 0; background: #0a0e14; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #d8cfc0; font-family: Georgia, 'Times New Roman', serif;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 30px; font-weight: normal; letter-spacing: 5px; margin-bottom: 10px; }
    #loading .sub { font-size: 13px; color: #8a93a5; letter-spacing: 2px; margin-bottom: 38px; }
    #loading .bar { width: 240px; height: 2px; background: #2a3242; visibility: hidden; }
    #loading .bar .fill { height: 100%; width: 0%; background: #e8b96f; transition: width 0.3s ease; }
    #loading .hint { margin-top: 16px; font-size: 13px; color: #6b7585; min-height: 18px; }
    #menu-buttons { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    #menu-buttons button {
      font-family: inherit; font-size: 16px; letter-spacing: 3px;
      background: none; border: 1px solid #4a5468; color: #d8cfc0;
      padding: 12px 44px; cursor: pointer; transition: all 0.25s;
    }
    #menu-buttons button:hover { border-color: #e8b96f; color: #e8b96f; }
    #menu-buttons button.hidden { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loading">
    <h1>ПОСЛЕДНИЙ СМОТРИТЕЛЬ</h1>
    <div class="sub">THE LAST LIGHTKEEPER</div>
    <div id="menu-buttons">
      <button id="btn-continue" class="hidden">ПРОДОЛЖИТЬ</button>
      <button id="btn-new">НОВАЯ ИГРА</button>
    </div>
    <div class="bar"><div class="fill" id="loading-fill"></div></div>
    <div class="hint" id="loading-hint"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
